          pattern: '^\d+\.\d{1,8}$'
          description: Gross tournament win amount before tax (must be > 0)
        round_finished:
          type: boolean
          default: false
          description: Indicates that this is the last transaction in the round
        taxes:
          $ref: '#/components/schemas/Taxes'
        extensions:
          $ref: '#/components/schemas/Extensions'


    BatchJackpotWin:
      type: object
      required: [action, game_id, round_id, transaction_id, amount]
      properties:
        action:
          type: string
          const: "jackpot-win"
        game_id:
          type: string
          maxLength: 255
          description: Identifier of the game
        round_id:
          type: string
          maxLength: 255
          description: Round identifier linking bets to wins
        transaction_id:
          type: string
          maxLength: 255
          description: Unique identifier of the transaction
        amount:
          type: string
          format: decimal
          pattern: '^\d+\.\d{1,8}$'
          description: Gross jackpot win amount before tax (must be > 0)
        round_finished:
          type: boolean
          default: false
          description: Indicates that this is the last transaction in the round
        taxes:
          $ref: '#/components/schemas/Taxes'
        extensions:
          $ref: '#/components/schemas/Extensions'


    BatchRefund:
      type: object
      required: [action, type, game_id, round_id, transaction_id, original_transaction_id, amount]
      properties:
        action:
          type: string
          const: "refund"
        type:
          type: string
          maxLength: 50
          enum: [bet, win]
          description: >
            Type of the original transaction being refunded:
            `bet` — cancels a bet (credits the player),
            `win` — cancels a win (debits the player).
        game_id:
          type: string
          maxLength: 255
          description: Identifier of the game
        round_id:
          type: string
          maxLength: 255
          description: Round identifier linking bets to wins
        transaction_id:
          type: string
          maxLength: 255
          description: Unique identifier of the transaction
        original_transaction_id:
          type: string
          maxLength: 255
          description: Transaction ID of the original bet or win being refunded
        amount:
          type: string
          format: decimal
          pattern: '^\d+\.\d{1,8}$'
          description: Refund amount (must be > 0)
        round_finished:
          type: boolean
          default: false
          description: Indicates that this is the last transaction in the round
        extensions:
          $ref: '#/components/schemas/Extensions'


    # ── Batch Response ───────────────────────────────────────────────────────
    BatchResponse:
      type: object
      required: [status, balance, currency, results]
      properties:
        status:
          type: boolean
          const: true
          description: Always true — batch succeeded atomically
        balance:
          type: string
          format: decimal
          pattern: '^\d+\.\d{1,8}$'
          description: Final balance after all transactions in the batch
        currency:
          $ref: '#/components/schemas/Currency'
        results:
          type: array
          description: >
            Per-transaction results in the same order as the request.
            Present only on success — contains one entry per transaction.
          items:
            $ref: '#/components/schemas/BatchTransactionResult'


    BatchTransactionResult:
      type: object
      required: [transaction_id, balance]
      properties:
        transaction_id:
          type: string
          maxLength: 255
          description: Unique transaction identifier assigned by the Operator
        balance:
          type: string
          format: decimal
          pattern: '^\d+\.\d{1,8}$'
          description: Balance after this transaction


    # ── Shared response schemas ───────────────────────────────────────────────
    TransactionResponse:
      type: object
      required: [status, transaction_id, balance, currency]
      properties:
        status:
          type: boolean
          description: "true on success, false on failure"
        transaction_id:
          type: string
          maxLength: 255
          description: >
            Unique transaction identifier assigned by the Operator.
            On duplicate requests, the original transaction_id is returned.
        balance:
          type: string
          format: decimal
          pattern: '^\d+\.\d{1,8}$'
          description: User balance after the operation
        currency:
          $ref: '#/components/schemas/Currency'
        extensions:
          $ref: '#/components/schemas/Extensions'


    ErrorResponse:
      type: object
      required: [status, code, message]
      properties:
        status:
          type: boolean
          const: false
          description: Always false for errors
        code:
          type: integer
          description: |
            Error code:
            - 0 — Server error (retry)
            - 1 — Insufficient funds (display error, terminate session)
            - 2 — Currency mismatch (terminate session)
            - 3 — User not found / not allowed (terminate session)
            - 4 — Invalid or expired token (terminate session / prompt parent page reload)
            - 5 — Invalid signature (X-Signature header missing or mismatch)
            - 6 — Original transaction not found (referenced bet or win does not exist; re-send and retry, or terminate)
            - 8 — Loss limit reached
            - 9 — Max bet limit reached
          enum: [0, 1, 2, 3, 4, 5, 6, 8, 9]
        message:
          type: string
          maxLength: 255
          description: Human-readable error message



tags:
  - name: Provider API
    description: |
      Operator → Provider. Game launch and content delivery endpoints
      hosted by the Game Provider.

      During integration onboarding the Provider must supply a **base URL**
      (e.g. `https://games.provider.com` or `https://games.provider.com/api/v1`).
      All Provider API paths in this spec are appended to that base URL.
      The Operator stores this value per provider and uses it for every
      outgoing request.
  - name: Operator Wallet API
    description: |
      Provider → Operator. Seamless Wallet endpoints implemented
      by the Operator. Includes session authentication, balance
      checks, and all transaction operations (bet, win, refund).
