openapi: 3.1.0
info:
  title: Seamless Wallet API
  version: 4.0.0
  description: |
    Seamless Wallet integration protocol for game providers and operators.

    In the Seamless Wallet implementation, there is no wallet on the Provider's side.
    The wallet exists only on the Operator's side. The Operator is responsible for
    storing each user's balance and all transaction history.

    **Roles:**
    - **Provider** — Game provider
    - **Operator** — Game operation handler

    **Protocol:** JSON over HTTPS POST

    ## Signature

    All requests and responses are signed via the `X-Signature` HTTP header —
    an HMAC-SHA256 hash of the **raw request/response body** ensuring packet
    integrity and authenticity.

    The signature is computed over the raw body bytes as sent over the wire —
    no JSON parsing, sorting, or field manipulation is needed.

    **Algorithm:**

    1. Read the raw HTTP body as a byte string
    2. Compute `HMAC-SHA256` of that byte string using the shared secret key
    3. Send/verify the result as a **64-character lowercase hex string**
       in the `X-Signature` header

    **PHP example:**

    ```php
    // --- Sending ---
    $body = json_encode($payload, JSON_UNESCAPED_SLASHES | JSON_UNESCAPED_UNICODE);
    $signature = hash_hmac('sha256', $body, $secretKey);
    // Set header: X-Signature: $signature
    // Send body: $body

    // --- Receiving ---
    $rawBody = file_get_contents('php://input');
    $expected = hash_hmac('sha256', $rawBody, $secretKey);
    $received = $_SERVER['HTTP_X_SIGNATURE'] ?? '';

    if (!hash_equals($expected, $received)) {
        // Respond with error code 5 — Invalid signature
    }

    $payload = json_decode($rawBody, true);
    ```

    **Pseudocode (language-agnostic):**

    ```
    signature = hmac_sha256(raw_body_bytes, SECRET_KEY)
    set_header("X-Signature", signature)
    ```

    > **Note:** The secret key is provided during integration onboarding.
    > Both sides (Provider and Operator) must use the same key. Always use
    > timing-safe comparison (e.g. `hash_equals` in PHP) when verifying
    > signatures. The raw body must not be modified by middleware (no
    > re-encoding or pretty-printing) between signing and verification.

    **Idempotency:** All wallet transaction endpoints (`/bet`, `/win`,
    `/free-spin-bet`, `/free-spin-win`, `/tournament-win`, `/jackpot-win`,
    `/refund`) are idempotent on `transaction_id`. If the Operator receives
    a request with a `transaction_id` that has already been successfully
    processed, it **must** return the original `TransactionResponse`
    (with `status: true`, the original operator-side `transaction_id`,
    and the current balance) — not an error.
    This ensures safe retries over unreliable networks.

    **Response header:** All responses contain an `X-Request-Id` header —
    a unique request identifier for quick transaction lookup on the operator's side.

servers:
  - url: https://{operatorHost}
    description: Operator — implements Seamless Wallet API called by the Provider
    variables:
      operatorHost:
        default: api.operator.com
        description: Operator's Seamless Wallet API host
  - url: https://{providerHost}
    description: Provider — game launch and content delivery
    variables:
      providerHost:
        default: games.provider.com
        description: Game provider's host

# ===========================================================================
# Paths
# ===========================================================================
paths:

  # =========================================================================
  # Provider API (Operator → Provider)
  # =========================================================================

  # -------------------------------------------------------------------------
  # Launch Game
  # -------------------------------------------------------------------------
  /launch-game:
    get:
      operationId: launchGame
      summary: Launch a game session
      description: |
        Opens a game in the provider's iframe/page. Called by the operator's
        frontend to start a real or demo game session.

        The game provider must support auto-resize of game content and mobile games.

        **Example request URL:**

        ```
        https://games.provider.com/launch-game?action=real&game_id=1056&token=704be4er164ef34cc56ccbb64a960868&lobby_url=https%3A%2F%2Fcasino.operator.com%2Flobby&language=uk
        ```
      tags: [Provider API]
      servers:
        - url: https://{providerHost}
          description: Game provider host
          variables:
            providerHost:
              default: games.provider.com
      parameters:
        - name: action
          in: query
          required: true
          description: |
            Game mode:
            - `real` — real-money game
            - `demo` — demo game
          schema:
            type: string
            enum: [real, demo]
        - name: game_id
          in: query
          required: true
          description: Identifier of the game
          schema:
            type: string
          examples:
            byId:
              value: "623"
              summary: Numeric game id
            byName:
              value: "Valhalla"
              summary: Game name
            composite:
              value: "21312:slots"
              summary: Composite id with category
        - name: token
          in: query
          required: true
          description: Gaming session token. Required for real game mode only.
          schema:
            type: string
            maxLength: 255
        - name: lobby_url
          in: query
          required: true
          description: URL for redirection to the casino lobby when the player exits the game
          schema:
            type: string
            format: uri
        - name: client_id
          in: query
          required: false
          description: Unique Operator identifier assigned by the Provider
          schema:
            type: string
        - name: language
          in: query
          required: false
          description: User's language code (ISO 639-1)
          schema:
            type: string
            maxLength: 2
      responses:
        '200':
          description: Game page rendered successfully (HTML content)
        '302':
          description: Redirect to the game page

  # -------------------------------------------------------------------------
  # Create Free Spin Offer
  # -------------------------------------------------------------------------
  /create-free-spins:
    post:
      operationId: createFreeSpins
      summary: Create a free-spin offer for a player
      description: |
        Creates a free-spin offer on the Provider's side. The Operator sends
        offer details (game, spin count, bet value, expiration) along with
        the `free_spin_offer_id` that will be used to reference this offer
        in all subsequent wallet callbacks and cancellation requests.
      tags: [Provider API]
      servers:
        - url: https://{providerHost}
          description: Game provider host
          variables:
            providerHost:
              default: games.provider.com
      parameters:
        - $ref: '#/components/parameters/XSignatureParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFreeSpinOfferRequest'
            example:
              user_id: 123
              game_id: "1056"
              spin_count: 20
              bet_value: "0.50"
              currency: "UAH"
              free_spin_offer_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              expires_at: "2025-12-31T23:59:59Z"

      responses:
        '200':
          description: Free-spin offer created
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeSpinOfferStatusResponse'
              example:
                status: true

        '200#error':
          description: Free-spin offer creation failed
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeSpinOfferErrorResponse'
              example:
                status: false
                message: "Game not found"


  # -------------------------------------------------------------------------
  # Cancel Free Spin Offer
  # -------------------------------------------------------------------------
  /cancel-free-spins:
    post:
      operationId: cancelFreeSpins
      summary: Cancel an existing free-spin offer
      description: |
        Cancels a previously created free-spin offer on the Provider's side.
        Any unused spins from the offer are voided. Already played spins
        and their results are not affected.
      tags: [Provider API]
      servers:
        - url: https://{providerHost}
          description: Game provider host
          variables:
            providerHost:
              default: games.provider.com
      parameters:
        - $ref: '#/components/parameters/XSignatureParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelFreeSpinOfferRequest'
            example:
              free_spin_offer_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

      responses:
        '200':
          description: Free-spin offer cancelled
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeSpinOfferStatusResponse'
              example:
                status: true

        '200#error':
          description: Cancellation failed (e.g. offer not found or already fully used)
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FreeSpinOfferErrorResponse'
              example:
                status: false
                message: "Offer not found or already completed"


  # =========================================================================
  # Operator Wallet API (Provider → Operator)
  # =========================================================================

  # -------------------------------------------------------------------------
  # Auth
  # -------------------------------------------------------------------------
  /auth:
    post:
      operationId: auth
      summary: Authenticate player session
      description: |
        Validates the gaming session token and returns player details.
        Called on user logon to get relevant data for processing and
        validate received data from launcher information.
      tags: [Operator Wallet API]
      parameters:
        - $ref: '#/components/parameters/XSignatureParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
            example:
              token: "704be4er164ef34cc56ccbb64a960868"

      responses:
        '200':
          description: Successful authentication
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
              example:
                status: true
                user_id: 123456
                user_name: "Taras Shevchenko"
                balance: "98947.93"
                currency: "UAH"
                language: "uk"
                test_user: false

        '200#error':
          description: Authentication failed
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: false
                code: 4
                message: "Invalid or expired token"

  # -------------------------------------------------------------------------
  # Balance
  # -------------------------------------------------------------------------
  /balance:
    post:
      operationId: balance
      summary: Check player balance
      description: Returns the current balance of the player.
      tags: [Operator Wallet API]
      parameters:
        - $ref: '#/components/parameters/XSignatureParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BalanceRequest'
            example:
              token: "704be4er164ef34cc56ccbb64a960868"
              user_id: 123
              currency: "UAH"

      responses:
        '200':
          description: Balance retrieved
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceResponse'
              example:
                status: true
                balance: "98947.93"
                currency: "UAH"

        '200#error':
          description: Balance check failed
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: false
                code: 3
                message: "User not found"

  # -------------------------------------------------------------------------
  # Bet
  # -------------------------------------------------------------------------
  /bet:
    post:
      operationId: bet
      summary: Place a bet
      description: |
        Deducts the bet amount from the player's balance.
        The `amount` must always be > 0.
      tags: [Operator Wallet API]
      parameters:
        - $ref: '#/components/parameters/XSignatureParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BetRequest'
            example:
              token: "704be4er164ef34cc56ccbb64a960868"
              user_id: 123
              game_id: "1056"
              round_id: "123456"
              transaction_id: "97401685"
              amount: "10.50"
              currency: "UAH"

      responses:
        '200':
          description: Bet placed
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
              example:
                status: true
                balance: "9894693.00"
                transaction_id: "17513312722"
                currency: "UAH"

        '200#error':
          description: Bet failed
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: false
                code: 1
                message: "Insufficient funds"

  # -------------------------------------------------------------------------
  # Free Spin Bet
  # -------------------------------------------------------------------------
  /free-spin-bet:
    post:
      operationId: freeSpinBet
      summary: Place a free-spin bet
      description: |
        Places a bet within a free-spin offer. The `amount` carries the nominal
        bet level of the spin; some providers send 0 when no funds are deducted.
      tags: [Operator Wallet API]
      parameters:
        - $ref: '#/components/parameters/XSignatureParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FreeSpinBetRequest'
            example:
              token: "704be4er164ef34cc56ccbb64a960868"
              user_id: 123
              game_id: "1056"
              round_id: "123456"
              transaction_id: "97401685"
              amount: "10.00"
              currency: "UAH"
              free_spin_offer_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

      responses:
        '200':
          description: Free-spin bet placed
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
              example:
                status: true
                transaction_id: "17513312722"
                balance: "98946.93"
                currency: "UAH"

        '200#error':
          description: Free-spin bet failed
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: false
                code: 1
                message: "Insufficient funds"

  # -------------------------------------------------------------------------
  # Win
  # -------------------------------------------------------------------------
  /win:
    post:
      operationId: win
      summary: Place a win
      description: |
        Credits the win amount to the player's balance.

        **Important rules:**
        - Win with amount = 0 is required for lost bets.
        - Wins without corresponding bets will not be processed.
        - Wins must be repeated until a response with success is received,
          except when the Operator responds with error code 6 (original
          transaction not found) — in that case no corresponding bet exists
          and retrying is pointless.
      tags: [Operator Wallet API]
      parameters:
        - $ref: '#/components/parameters/XSignatureParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WinRequest'
            example:
              token: "704be4er164ef34cc56ccbb64a960868"
              user_id: 123
              game_id: "1056"
              round_id: "123456"
              transaction_id: "97401686"
              bet_transaction_id: "97401685"
              amount: "20.00"
              currency: "UAH"
              taxes:
                - type: "pdfo"
                  percent: "18.00"
                  amount: "3.60"
                - type: "military_levy"
                  percent: "5.00"
                  amount: "1.00"

      responses:
        '200':
          description: Win processed
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
              example:
                status: true
                transaction_id: "17513312723"
                balance: "98948.93"
                currency: "UAH"

        '200#error':
          description: Win processing failed
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: false
                code: 6
                message: "Original transaction not found"

  # -------------------------------------------------------------------------
  # Free Spin Win
  # -------------------------------------------------------------------------
  /free-spin-win:
    post:
      operationId: freeSpinWin
      summary: Place a free-spin win
      description: |
        Credits the free-spin win amount to the player's balance.

        **Important rules:**
        - Win with amount = 0 is required for lost bets.
        - Wins without corresponding bets will not be processed.
        - Wins must be repeated until a response with success is received,
          except when the Operator responds with error code 6 (original
          transaction not found) — in that case no corresponding bet exists
          and retrying is pointless.
      tags: [Operator Wallet API]
      parameters:
        - $ref: '#/components/parameters/XSignatureParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FreeSpinWinRequest'
            example:
              token: "704be4er164ef34cc56ccbb64a960868"
              user_id: 123
              game_id: "1056"
              round_id: "123456"
              transaction_id: "97401686"
              free_spin_offer_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
              bet_transaction_id: "97401685"
              amount: "20.00"
              currency: "UAH"

      responses:
        '200':
          description: Free-spin win processed
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
              example:
                status: true
                transaction_id: "17513312723"
                balance: "98948.93"
                currency: "UAH"

        '200#error':
          description: Free-spin win processing failed
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: false
                code: 6
                message: "Original transaction not found"

  # -------------------------------------------------------------------------
  # Tournament Win
  # -------------------------------------------------------------------------
  /tournament-win:
    post:
      operationId: tournamentWin
      summary: Place a tournament win
      description: Credits the tournament win amount to the player's balance.
      tags: [Operator Wallet API]
      parameters:
        - $ref: '#/components/parameters/XSignatureParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TournamentWinRequest'
            example:
              token: "704be4er164ef34cc56ccbb64a960868"
              user_id: 123
              game_id: "1056"
              round_id: "123456"
              transaction_id: "97401686"
              amount: "20.00"
              currency: "UAH"

      responses:
        '200':
          description: Tournament win processed
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
              example:
                status: true
                transaction_id: "17513312723"
                balance: "98948.93"
                currency: "UAH"

        '200#error':
          description: Tournament win processing failed
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: false
                code: 0
                message: "Server error"

  # -------------------------------------------------------------------------
  # Jackpot Win
  # -------------------------------------------------------------------------
  /jackpot-win:
    post:
      operationId: jackpotWin
      summary: Place a jackpot win
      description: Credits the jackpot win amount to the player's balance.
      tags: [Operator Wallet API]
      parameters:
        - $ref: '#/components/parameters/XSignatureParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JackpotWinRequest'
            example:
              token: "704be4er164ef34cc56ccbb64a960868"
              user_id: 123
              game_id: "1056"
              round_id: "123456"
              transaction_id: "97401686"
              amount: "20.00"
              currency: "UAH"

      responses:
        '200':
          description: Jackpot win processed
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
              example:
                status: true
                transaction_id: "17513312723"
                balance: "98948.93"
                currency: "UAH"

        '200#error':
          description: Jackpot win processing failed
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: false
                code: 0
                message: "Server error"

  # -------------------------------------------------------------------------
  # Refund
  # -------------------------------------------------------------------------
  /refund:
    post:
      operationId: refund
      summary: Refund a transaction
      description: |
        Refunds a previously placed bet or cancels a win, adjusting the
        player's balance accordingly.

        The `type` field determines what is being refunded:
        - `bet` — cancels a bet, credits the amount back to the player
        - `win` — cancels a win, debits the amount from the player
      tags: [Operator Wallet API]
      parameters:
        - $ref: '#/components/parameters/XSignatureParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundRequest'
            examples:
              bet_refund:
                summary: Refund a bet
                value:
                  token: "704be4er164ef34cc56ccbb64a960868"
                  user_id: 123
                  type: "bet"
                  game_id: "1056"
                  round_id: "123457"
                  transaction_id: "97401687"
                  original_transaction_id: "97401685"
                  amount: "10.00"
                  currency: "UAH"

              win_refund:
                summary: Cancel a win
                value:
                  token: "704be4er164ef34cc56ccbb64a960868"
                  user_id: 123
                  type: "win"
                  game_id: "1056"
                  round_id: "123456"
                  transaction_id: "97401688"
                  original_transaction_id: "97401686"
                  amount: "20.00"
                  currency: "UAH"
      responses:
        '200':
          description: Refund processed
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
              example:
                status: true
                transaction_id: "17513312723"
                balance: "98948.93"
                currency: "UAH"

        '200#error':
          description: Refund failed
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: false
                code: 6
                message: "Original transaction not found"

  # -------------------------------------------------------------------------
  # Batch
  # -------------------------------------------------------------------------
  /batch:
    post:
      operationId: batch
      summary: Process multiple transactions in order
      description: |
        Processes an ordered list of transactions within a single HTTP call.
        Transactions are applied **sequentially** in array order.

        Common session fields (`token`, `user_id`, `currency`) are specified
        once at the top level and apply to every transaction in the batch.

        **Processing semantics:**
        - Transactions are processed **atomically** (all-or-nothing).
          Either every transaction in the batch succeeds and the balance is
          updated, or none of them are applied.
        - If any transaction fails, the Operator **rolls back** all
          previously applied transactions in the batch — the player's
          balance remains unchanged.
        - Each transaction is idempotent on its `transaction_id`, same as the
          individual endpoints.
        - The `round_finished` flag on the last transaction in a round still
          triggers round finalization as usual.
      tags: [Operator Wallet API]
      parameters:
        - $ref: '#/components/parameters/XSignatureParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchRequest'
            example:
              token: "704be4er164ef34cc56ccbb64a960868"
              user_id: 123
              currency: "UAH"
              transactions:
                - action: "bet"
                  game_id: "1056"
                  round_id: "123456"
                  transaction_id: "97401685"
                  amount: "10.50"
                - action: "win"
                  game_id: "1056"
                  round_id: "123456"
                  transaction_id: "97401686"
                  bet_transaction_id: "97401685"
                  amount: "20.00"
                  round_finished: true

      responses:
        '200':
          description: All transactions succeeded
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchResponse'
              example:
                status: true
                balance: "98957.43"
                currency: "UAH"
                results:
                  - transaction_id: "17513312722"
                    balance: "98937.43"
                  - transaction_id: "17513312723"
                    balance: "98957.43"

        '200#error':
          description: Batch failed — no transactions were applied
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
            X-Signature:
              $ref: '#/components/headers/XSignature'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: false
                code: 4
                message: "Invalid or expired token"

# =============================================================================
# Components
# =============================================================================
components:

  # ---------------------------------------------------------------------------
  # Parameters (request headers)
  # ---------------------------------------------------------------------------
  parameters:
    XSignatureParam:
      name: X-Signature
      in: header
      required: true
      description: >
        HMAC-SHA256 hex digest of the raw HTTP request body using the shared
        secret key.
      schema:
        $ref: '#/components/schemas/Signature'

  # ---------------------------------------------------------------------------
  # Headers (response headers)
  # ---------------------------------------------------------------------------
  headers:
    XRequestId:
      description: Unique request identifier for quick transaction search on the operator's side
      required: true
      schema:
        type: string
    XSignature:
      description: >
        HMAC-SHA256 hex digest of the raw HTTP body using the shared secret key.
        Required on all requests and responses.
      required: true
      schema:
        $ref: '#/components/schemas/Signature'

  # ---------------------------------------------------------------------------
  # Schemas
  # ---------------------------------------------------------------------------
  schemas:

    # ── Signature (kept for reference in X-Signature header schema) ─────────
    Signature:
      type: string
      minLength: 64
      maxLength: 64
      pattern: '^[0-9a-f]{64}$'
      description: >
        HMAC-SHA256 hex digest of the raw HTTP body using the shared
        secret key. Sent/received as the `X-Signature` header.

    # ── Currency field (reusable) ───────────────────────────────────────────
    Currency:
      type: string
      maxLength: 10
      description: >
        Currency code. ISO 4217 for fiat (3 chars), or a common ticker
        for cryptocurrencies (e.g. USDT, BTC).
      examples:
        - "UAH"
        - "EUR"
        - "USD"
        - "USDT"
        - "BTC"
        - "ETH"

    # ── Tax data (reusable, optional) ─────────────────────────────────────
    Taxes:
      type: array
      description: >
        List of taxes calculated by the Provider. Optional — included only
        when the Provider applies taxes to the win amount on behalf of the
        Operator. When present, `amount` in the parent request is always
        the gross (pre-tax) value. Multiple tax entries support jurisdictions
        with cascading or composite tax rules (e.g. UA: PDFO + military levy).
      minItems: 1
      items:
        $ref: '#/components/schemas/TaxItem'

    TaxItem:
      type: object
      required: [type, percent, amount]
      properties:
        type:
          type: string
          maxLength: 50
          description: >
            Tax type identifier (e.g. "pdfo", "military_levy",
            "income_tax", "withholding").
        percent:
          type: string
          format: decimal
          pattern: '^\d+\.\d{1,8}$'
          description: Tax rate as a decimal string (e.g. "18.00", "5.00")
        amount:
          type: string
          format: decimal
          pattern: '^\d+\.\d{1,8}$'
          description: Tax amount as a decimal string (e.g. "180.00", "50.00")

    # ── Extensions (domain-specific custom fields) ─────────────────────────
    Extensions:
      type: object
      description: >
        Optional domain-specific custom fields. Providers may include
        additional metadata relevant to their game vertical (e.g. lottery,
        scratch cards). The Operator MUST store these fields alongside the
        transaction and MAY use them for reporting, reconciliation, or
        regulatory compliance. Unknown fields MUST be preserved as-is.


        **Known fields (lottery / instant games):**

        | Field          | Type    | Description                                |
        |----------------|---------|--------------------------------------------|
        | `series_id`    | integer | Series identifier (instant / scratch)      |
        | `draw_id`      | integer | Draw identifier (draw games)               |
        | `barcode`      | string  | Human-readable ticket barcode              |
      additionalProperties: true
      properties:
        series_id:
          type: integer
          description: Series identifier (instant / scratch games)
        draw_id:
          type: integer
          description: Draw identifier (draw games)
        barcode:
          type: string
          maxLength: 255
          description: Human-readable ticket barcode

    # ── Free Spin Offer (Provider API) ─────────────────────────────────────
    CreateFreeSpinOfferRequest:
      type: object
      required: [user_id, game_id, spin_count, bet_value, currency, free_spin_offer_id, expires_at]
      properties:
        user_id:
          type: integer
          format: int64
          description: Unique player identifier on Operator's side
        game_id:
          type: string
          maxLength: 255
          description: Identifier of the game
        spin_count:
          type: integer
          minimum: 1
          description: Number of free-spins in the offer
        bet_value:
          type: string
          format: decimal
          pattern: '^\d+\.\d{1,8}$'
          description: Bet value per spin
        currency:
          $ref: '#/components/schemas/Currency'
        free_spin_offer_id:
          type: string
          format: uuid
          description: >
            Free-spin offer identifier (UUID) assigned by the Operator.
            Referenced in `/free-spin-bet`, `/free-spin-win` callbacks
            and `/cancel-free-spins`.
        expires_at:
          type: string
          format: date-time
          description: Offer expiration date-time (ISO 8601)


    CancelFreeSpinOfferRequest:
      type: object
      required: [free_spin_offer_id]
      properties:
        free_spin_offer_id:
          type: string
          format: uuid
          description: Free-spin offer identifier provided via `/create-free-spins`


    FreeSpinOfferStatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: boolean
          description: "true on success, false on failure"


    FreeSpinOfferErrorResponse:
      type: object
      required: [status, message]
      properties:
        status:
          type: boolean
          const: false
        message:
          type: string
          maxLength: 255
          description: Human-readable error message


    # ── Auth ────────────────────────────────────────────────────────────────
    AuthRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          maxLength: 255
          description: Gaming session token (real game only)


    AuthResponse:
      type: object
      required: [status, user_id, user_name, test_user, balance, currency, language]
      properties:

        status:
          type: boolean
          description: "true on success, false on failure"
        user_id:
          type: integer
          format: int64
          description: Unique player identifier on Operator's side
        user_name:
          type: string
          maxLength: 255
          description: Player's display name
        test_user:
          type: boolean
          description: Whether the player is a test user
        balance:
          type: string
          format: decimal
          pattern: '^\d+\.\d{1,8}$'
          description: User balance after the operation
        currency:
          $ref: '#/components/schemas/Currency'
        language:
          type: string
          maxLength: 2
          description: Game language code (ISO 639-1)

    # ── Balance ─────────────────────────────────────────────────────────────
    BalanceRequest:
      type: object
      required: [token, user_id, currency]
      properties:
        token:
          type: string
          maxLength: 255
          description: Gaming session token (real game only)
        user_id:
          type: integer
          format: int64
          description: Unique player identifier on Operator's side
        currency:
          $ref: '#/components/schemas/Currency'


    BalanceResponse:
      type: object
      required: [status, balance, currency]
      properties:
        status:
          type: boolean
        balance:
          type: string
          format: decimal
          pattern: '^\d+\.\d{1,8}$'
          description: User balance after the operation
        currency:
          $ref: '#/components/schemas/Currency'


    # ── Bet ──────────────────────────────────────────────────────────────────
    BetRequest:
      type: object
      required: [token, user_id, game_id, round_id, transaction_id, amount, currency]
      properties:
        token:
          type: string
          maxLength: 255
          description: Gaming session token (real game only)
        user_id:
          type: integer
          format: int64
          description: Unique player identifier on Operator's side
        game_id:
          type: string
          maxLength: 255
          description: Identifier of the game
        round_id:
          type: string
          maxLength: 255
          description: |
            Round identifier linking bets to wins. Must be unique between rounds.
        transaction_id:
          type: string
          maxLength: 255
          description: Unique identifier of the transaction
        amount:
          type: string
          format: decimal
          pattern: '^\d+\.\d{1,8}$'
          description: Bet amount (must be > 0)
        currency:
          $ref: '#/components/schemas/Currency'
        round_finished:
          type: boolean
          default: false
          description: >
            Indicates that this is the last transaction in the round.
            When true, the Operator may finalize the round for reporting
            and reconciliation.
        extensions:
          $ref: '#/components/schemas/Extensions'


    # ── Free Spin Bet ─────────────────────────────────────────────────────────
    FreeSpinBetRequest:
      type: object
      required: [token, user_id, game_id, round_id, transaction_id, free_spin_offer_id, amount, currency]
