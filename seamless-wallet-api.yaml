          type: string
          maxLength: 255
          description: Identifier of the game
        round_id:
          type: string
          maxLength: 255
          description: Round identifier linking bets to wins
        transaction_id:
          type: string
          maxLength: 255
          description: Unique identifier of the transaction
        amount:
          type: string
          format: decimal
          pattern: '^\d+\.\d{1,8}$'
          description: Bet amount (must be > 0)
        round_finished:
