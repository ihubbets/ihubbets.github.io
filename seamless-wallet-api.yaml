    # ── Batch ────────────────────────────────────────────────────────────────
    BatchRequest:
      type: object
      required: [token, user_id, currency, transactions]
      properties:
        token:
          type: string
          maxLength: 255
          description: Gaming session token (real game only)
        user_id:
          type: integer
          format: int64
          description: Unique player identifier on Operator's side
        currency:
          $ref: '#/components/schemas/Currency'
        transactions:
          type: array
          description: >
            Ordered list of transactions to process sequentially.
            Each item specifies an `action` that determines the transaction type
            and corresponding fields.
          minItems: 1
          items:
            $ref: '#/components/schemas/BatchTransaction'


    BatchTransaction:
      oneOf:
        - $ref: '#/components/schemas/BatchBet'
        - $ref: '#/components/schemas/BatchWin'
        - $ref: '#/components/schemas/BatchFreeSpinBet'
        - $ref: '#/components/schemas/BatchFreeSpinWin'
        - $ref: '#/components/schemas/BatchTournamentWin'
        - $ref: '#/components/schemas/BatchJackpotWin'
        - $ref: '#/components/schemas/BatchRefund'
      discriminator:
        propertyName: action
        mapping:
          bet: '#/components/schemas/BatchBet'
          win: '#/components/schemas/BatchWin'
          free-spin-bet: '#/components/schemas/BatchFreeSpinBet'
          free-spin-win: '#/components/schemas/BatchFreeSpinWin'
          tournament-win: '#/components/schemas/BatchTournamentWin'
          jackpot-win: '#/components/schemas/BatchJackpotWin'
          refund: '#/components/schemas/BatchRefund'


