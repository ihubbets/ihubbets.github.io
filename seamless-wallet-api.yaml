          format: decimal
          pattern: '^\d+\.\d{1,8}$'
          description: >
            Nominal bet amount of the free-spin. Some providers send the
            bet level value (> 0), others send 0 since no funds are
            deducted from the player's wallet.
        currency:
          $ref: '#/components/schemas/Currency'
        round_finished:
          type: boolean
          default: false
          description: >
            Indicates that this is the last transaction in the round.
            When true, the Operator may finalize the round for reporting
            and reconciliation.
        extensions:
