    # ── Refund ────────────────────────────────────────────────────────────────
    RefundRequest:
      type: object
      required: [token, user_id, type, game_id, round_id, transaction_id, original_transaction_id, amount, currency]
      properties:
        token:
          type: string
          maxLength: 255
          description: Gaming session token (real game only)
        user_id:
          type: integer
          format: int64
          description: Unique player identifier on Operator's side
        type:
          type: string
          maxLength: 50
          enum: [bet, win]
          description: >
            Type of the original transaction being refunded:
            `bet` — cancels a bet (credits the player),
            `win` — cancels a win (debits the player).
        game_id:
          type: string
          maxLength: 255
          description: Identifier of the game
        round_id:
          type: string
          maxLength: 255
          description: |
            Round identifier linking bets to wins. Must be unique between rounds.
        transaction_id:
          type: string
          maxLength: 255
          description: Unique identifier of the transaction
        original_transaction_id:
          type: string
          maxLength: 255
